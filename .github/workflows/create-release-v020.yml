name: Create Release v0.2.0

on:
  push:
    branches: [main]
    paths: [".github/workflows/create-release-v020.yml"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag v0.2.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.2.0 HEAD
          git push origin v0.2.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.2.0
          name: v0.2.0
          draft: false
          prerelease: false
          body: |
            ## What's New in v0.2.0

            ### Windows-Only Packaging
            - Removed Mac/Linux build scripts — packaging is now Windows-exclusive
            - Cleaned up `.github/workflows` (removed `build-macos.yml`)

            ### Improved Drag & Drop UX
            - Compact horizontal upload bar (icon + text + button on one line) — no longer takes up large vertical space
            - Animated overlay **"Thả file vào đây"** with bouncing arrow appears when dragging files over the zone
            - Green flash confirmation after dropping files so users always know the drop was registered
            - Fixed drag-counter bug: overlay no longer flickers when cursor passes over child elements

            ### Excel Format Support (.xlsx / .xls)
            - Translate Excel spreadsheets — all string cells across all sheets are translated
            - Structure and formatting fully preserved (numeric cells, formulas, styles untouched)
            - New `ExcelAdapter` groups cells into indexed blocks for efficient LLM translation
            - Added `openpyxl` dependency

            ### Other
            - File picker now accepts `.xlsx` / `.xls`
            - Format description updated: "Hỗ trợ TXT, EPUB, SRT, DOCX, XLSX"
            - Excel file icon 📊 in the file queue

            ---

            ### Installation
            1. Download and extract `TranslateBook-Windows.zip` from the assets
            2. Install [Ollama](https://ollama.ai) (for local LLM) or use a cloud API key
            3. Run `TranslateBook.exe`
            4. Open `http://localhost:5000` in your browser

            ### System Requirements
            - Windows 10/11 (64-bit)
            - Ollama for local LLM, or API keys for OpenAI / Gemini / OpenRouter / DeepSeek / Mistral / NVIDIA NIM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
