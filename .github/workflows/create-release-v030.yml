name: Create Release v0.3.0

on:
  push:
    branches: [main]
    paths: [".github/workflows/create-release-v030.yml"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag v0.3.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.3.0 HEAD
          git push origin v0.3.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.3.0
          name: v0.3.0
          draft: false
          prerelease: false
          body: |
            ## What's New in v0.3.0

            ### Bug Fixes

            #### 🔑 API Key "NOT SET" badge fixed
            - After saving an API key via **"Lưu cài đặt vào .env"**, the status badge now updates to **"✓ Configured"** immediately — no page reload needed.
            - Root cause: the backend was reading stale module-level imports instead of re-checking `os.environ` after writing the `.env` file. Fixed by updating `os.environ` in `_update_env_file` and reading fresh values in `get_default_config` / `get_settings`. The frontend now also reloads config after a successful save.

            #### 📊 Excel (.xlsx / .xls) upload error fixed
            - Uploading `.xlsx` / `.xls` files no longer shows *"Cannot determine file type for extension '.xlsx'. The file does not appear to be a supported text or document format."*
            - Root cause: the file validator in `security.py` had no entry for `.xlsx`/`.xls` in its `extension_validators` map, and the content-detection fallback had no `elif` branch for `xlsx` — so valid Excel files fell through to the error path. Fixed by adding `_validate_xlsx_file()` and registering both extensions.

            ---

            ### Installation
            1. Download and extract `ChuongPV_LlmTranslate.zip` from the assets below
            2. Install [Ollama](https://ollama.com) (only if you want local AI models; skip for cloud APIs)
            3. Run `TranslateBook.exe`
            4. Open `http://localhost:5000` in your browser

            ### System Requirements
            - Windows 10/11 (64-bit)
            - Ollama for local LLM, or API keys for OpenAI / Gemini / OpenRouter / DeepSeek / Mistral / Poe / NVIDIA NIM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
