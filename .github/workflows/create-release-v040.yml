name: Create Release v0.4.0

on:
  push:
    branches: [main]
    paths: [".github/workflows/create-release-v040.yml"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag v0.4.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v0.4.0 HEAD
          git push origin v0.4.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.4.0
          name: v0.4.0
          draft: false
          prerelease: false
          body: |
            ## What's New in v0.4.0

            ### Bug Fixes

            #### ⬇️ File Management download 404 fixed
            - Clicking **Download** in the *File Management* panel no longer returns `{"error":"Download failed","details":"404 Not Found..."}`.
            - Root cause: `send_from_directory` was being called with the relative `OUTPUT_DIR` (`'translated_files'`); when Werkzeug couldn't reconcile the path it raised `NotFound`, which the route's `except` block re-wrapped as the misleading 500 JSON. Fixed by using `send_file(file_path.resolve(), as_attachment=True, download_name=file_path.name)` — `find_file` already returns the absolute path so the directory lookup is unnecessary.

            #### 📝 Activity log now in sync with backend log
            - The frontend **Nhật ký hoạt động** panel was silently dropping `[file]`-prefixed entries that didn't match a narrow `isImportantMessage` regex (✅/❌/⚠️/ℹ️/completed/failed/error/warning/started/finished/interrupted), causing the UI log to diverge from what the backend was emitting.
            - Fixed by removing the `isImportantMessage` gate in `message-logger.js`. Verbose messages are still trimmed by `LOG_FILTERS` and per-chunk progress is still consolidated in-place — but ordinary log lines now appear in the UI just like in the backend console.

            #### ⏳ Upload status no longer stuck on "Đang tải lên..."
            - After a successful file upload the banner now switches to `✅ Đã tải lên '<file>' (<size> KB)` (with detected language when available) and auto-clears after 4 seconds, instead of staying on the loading message indefinitely.

            ---

            ### Installation
            1. Download and extract `ChuongPV_LlmTranslate.zip` from the assets below
            2. Install [Ollama](https://ollama.com) (only if you want local AI models; skip for cloud APIs)
            3. Run `TranslateBook.exe`
            4. Open `http://localhost:5000` in your browser

            ### System Requirements
            - Windows 10/11 (64-bit)
            - Ollama for local LLM, or API keys for OpenAI / Gemini / OpenRouter / DeepSeek / Mistral / Poe / NVIDIA NIM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
